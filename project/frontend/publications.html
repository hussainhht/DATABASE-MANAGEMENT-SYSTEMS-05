<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | Research Publication Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <a class="brand" href="index.html">
                <span class="brand-mark">RPT</span>
                <span>Research Publication Tracker</span>
            </a>
            <nav class="nav">
                <a href="index.html">Dashboard</a>
                <a href="departments.html">Departments</a>
                <a href="researchers.html">Researchers</a>
                <a class="active" href="publications.html">Publications</a>
                <a href="reports.html">Reports</a>
            </nav>
        </header>

        <main class="page">
            <section class="page-header">
                <div>
                    <h1>Publications</h1>
                    <p class="muted">Journal, conference, book chapter, and report records</p>
                </div>
            </section>

            <section class="grid two">
                <div class="panel">
                    <h2 id="formTitle">Add Publication</h2>
                    <form id="publicationForm" class="form-grid">
                        <input type="hidden" id="publicationId" data-record-id>
                        <div class="form-row">
                            <label for="title">Title</label>
                            <input id="title" name="title" type="text" maxlength="255" required>
                        </div>
                        <div class="form-row inline">
                            <div>
                                <label for="publicationYear">Year</label>
                                <input id="publicationYear" name="publication_year" type="number" min="1900" max="2026" required>
                            </div>
                            <div>
                                <label for="publicationType">Type</label>
                                <select id="publicationType" name="publication_type" required>
                                    <option value="">Select type</option>
                                    <option value="Journal">Journal</option>
                                    <option value="Conference">Conference</option>
                                    <option value="Book Chapter">Book Chapter</option>
                                    <option value="Report">Report</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <label for="venueId">Venue</label>
                            <select id="venueId" name="venue_id" required></select>
                        </div>
                        <div class="form-row">
                            <label for="doi">DOI</label>
                            <input id="doi" name="doi" type="text" maxlength="100">
                        </div>
                        <div class="form-row">
                            <label for="abstract">Abstract</label>
                            <textarea id="abstract" name="abstract"></textarea>
                        </div>
                        <div class="actions">
                            <button type="submit" id="saveButton">Save</button>
                            <button type="button" class="secondary" id="resetButton">Clear</button>
                        </div>
                        <p id="formStatus" class="status"></p>
                    </form>
                </div>

                <div class="panel">
                    <div class="toolbar">
                        <h2>Publication List</h2>
                        <input class="search-input" id="searchInput" type="search" placeholder="Search">
                    </div>
                    <div class="table-wrap">
                        <table>
                            <thead id="publicationsHead"></thead>
                            <tbody id="publicationsBody"></tbody>
                        </table>
                    </div>
                    <p id="tableStatus" class="status"></p>
                </div>
            </section>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script>
        const {
            $,
            apiRequest,
            formToObject,
            setFormValues,
            resetForm,
            renderHead,
            renderTable,
            filterRows,
            populateSelect,
            showStatus,
            clearStatus,
            toNumber
        } = window.RPT;

        const form = $("#publicationForm");
        const idInput = $("#publicationId");
        const formTitle = $("#formTitle");
        const formStatus = $("#formStatus");
        const tableStatus = $("#tableStatus");
        const searchInput = $("#searchInput");
        const venueSelect = $("#venueId");
        const columns = [
            { key: "publication_id", label: "ID" },
            { key: "title", label: "Title" },
            { key: "publication_year", label: "Year" },
            { key: "publication_type", label: "Type" },
            { key: "doi", label: "DOI" },
            { key: "venue_name", label: "Venue" }
        ];

        let publications = [];

        function actionButtons(row) {
            return `
                <div class="row-actions">
                    <button class="compact secondary" data-action="edit" data-id="${row.publication_id}">Edit</button>
                    <button class="compact danger" data-action="delete" data-id="${row.publication_id}">Delete</button>
                </div>
            `;
        }

        function drawTable() {
            const visibleRows = filterRows(publications, searchInput.value, ["title", "publication_type", "doi", "venue_name"]);
            renderTable($("#publicationsBody"), visibleRows, columns, actionButtons);
        }

        async function loadLookups() {
            const venues = await apiRequest("/api/venues");
            populateSelect(venueSelect, venues, "venue_id", "venue_name", "Select venue");
        }

        async function loadPublications() {
            clearStatus(tableStatus);
            try {
                publications = await apiRequest("/api/publications");
                drawTable();
            } catch (error) {
                showStatus(tableStatus, error.message, true);
            }
        }

        function resetPublicationForm() {
            resetForm(form);
            formTitle.textContent = "Add Publication";
            $("#saveButton").textContent = "Save";
            clearStatus(formStatus);
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            clearStatus(formStatus);

            const payload = formToObject(form);
            payload.publication_year = toNumber(payload.publication_year);
            payload.venue_id = toNumber(payload.venue_id);

            const id = idInput.value;
            const path = id ? `/api/publications/${id}` : "/api/publications";
            const method = id ? "PUT" : "POST";

            try {
                await apiRequest(path, {
                    method,
                    body: JSON.stringify(payload)
                });
                showStatus(formStatus, id ? "Publication updated." : "Publication added.");
                resetPublicationForm();
                await loadPublications();
            } catch (error) {
                showStatus(formStatus, error.message, true);
            }
        });

        $("#resetButton").addEventListener("click", resetPublicationForm);
        searchInput.addEventListener("input", drawTable);

        $("#publicationsBody").addEventListener("click", async (event) => {
            const button = event.target.closest("button");
            if (!button) {
                return;
            }

            const id = Number(button.dataset.id);
            const publication = publications.find((item) => item.publication_id === id);
            if (!publication) {
                return;
            }

            if (button.dataset.action === "edit") {
                setFormValues(form, publication);
                idInput.value = publication.publication_id;
                venueSelect.value = publication.venue_id;
                formTitle.textContent = "Edit Publication";
                $("#saveButton").textContent = "Update";
                clearStatus(formStatus);
                return;
            }

            if (button.dataset.action === "delete" && confirm("Delete this publication?")) {
                try {
                    await apiRequest(`/api/publications/${id}`, { method: "DELETE" });
                    showStatus(tableStatus, "Publication deleted.");
                    await loadPublications();
                    resetPublicationForm();
                } catch (error) {
                    showStatus(tableStatus, error.message, true);
                }
            }
        });

        renderHead($("#publicationsHead"), columns, true);
        loadLookups()
            .then(loadPublications)
            .catch((error) => showStatus(tableStatus, error.message, true));
    </script>
</body>
</html>
